name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle and sync Capacitor
        run: npm run build && npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/MathRush3D-v1.1.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: math-rush-3d-v1.1.0-apk
          path: android/app/build/outputs/apk/debug/MathRush3D-v1.1.0.apk
